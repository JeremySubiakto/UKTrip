<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FDF0F0" />
<title>UK Trip — Jer &amp; Tev</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#FDF0F0; --surface:#FFFFFF; --blush:#E8C5C1; --rose:#D4A5A0; --deep-rose:#B07F7A;
  --ink:#1C1A1A; --muted:#9E8A88; --gold:#C9A96E; --glass:rgba(255,255,255,0.65);
  --serif:"Cormorant Garamond",Georgia,serif; --sans:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --r-card:24px; --r-pill:9999px;
  --soft:0 2px 4px rgba(176,127,122,0.06),0 8px 24px rgba(176,127,122,0.12),0 24px 48px rgba(176,127,122,0.08);
  --soft-hover:0 4px 8px rgba(176,127,122,0.08),0 16px 40px rgba(176,127,122,0.18),0 32px 64px rgba(176,127,122,0.10);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
@media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } }
body{ font-family:var(--sans); color:var(--ink); background:var(--bg); line-height:1.6; overflow-x:hidden; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
body.locked{ overflow:hidden; }
body::before{ content:""; position:fixed; inset:0; z-index:-2; background:radial-gradient(1200px 700px at 80% -10%, rgba(232,197,193,0.40), transparent 60%),radial-gradient(900px 600px at -10% 100%, rgba(212,165,160,0.22), transparent 55%),var(--bg); }
img{ max-width:100%; display:block; } a{ color:inherit; text-decoration:none; } button{ font-family:inherit; }
.serif{ font-family:var(--serif); font-weight:400; }
.label{ font-family:var(--sans); font-weight:500; text-transform:uppercase; letter-spacing:0.08em; font-size:11px; color:var(--muted); }

.view{ display:none; } .view.active{ display:block; }
.view.content{ padding:108px 0 80px; min-height:100svh; }
.view.content.active{ animation:viewIn .5s cubic-bezier(.2,.8,.2,1); }
@keyframes viewIn{ from{ opacity:0; transform:translateY(16px);} to{ opacity:1; transform:none;} }
@media (prefers-reduced-motion: reduce){ .view.content.active,.cat-panel.active{ animation:none; } }
.wrap{ max-width:1120px; margin:0 auto; padding:0 22px; }

.section-head{ margin-bottom:24px; }
.section-head .eyebrow{ display:inline-flex; align-items:center; gap:8px; font-family:var(--sans); font-weight:500; text-transform:uppercase; letter-spacing:0.14em; font-size:11px; color:var(--deep-rose); background:var(--glass); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); border:1px solid rgba(232,197,193,0.6); padding:7px 14px; border-radius:var(--r-pill); box-shadow:0 2px 10px rgba(176,127,122,0.08); margin-bottom:14px; }
.section-head h2{ font-family:var(--serif); font-style:italic; font-weight:500; font-size:clamp(38px,7vw,62px); line-height:1.02; letter-spacing:-0.01em; color:var(--ink); }
.section-head p.kicker{ font-family:var(--sans); color:var(--muted); font-size:15px; margin-top:10px; max-width:46ch; }

.nav{ position:fixed; top:14px; left:50%; transform:translate(-50%,-160%); z-index:60; display:flex; align-items:center; gap:2px; background:var(--glass); -webkit-backdrop-filter:blur(18px) saturate(140%); backdrop-filter:blur(18px) saturate(140%); border:1px solid rgba(255,255,255,0.7); box-shadow:0 8px 30px rgba(176,127,122,0.18), inset 0 1px 0 rgba(255,255,255,0.6); border-radius:var(--r-pill); padding:6px; max-width:calc(100vw - 24px); overflow-x:auto; scrollbar-width:none; opacity:0; transition:transform .45s cubic-bezier(.2,.8,.2,1), opacity .45s ease; }
.nav::-webkit-scrollbar{ display:none; }
.nav.show{ transform:translate(-50%,0); opacity:1; }
.nav button{ flex:0 0 auto; display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-family:var(--sans); font-weight:600; font-size:13px; letter-spacing:-0.01em; color:var(--deep-rose); background:transparent; border:none; padding:9px 13px; border-radius:var(--r-pill); white-space:nowrap; transition:background .2s, color .2s, transform .2s; }
.nav button .ic{ font-size:14px; }
.nav button:hover{ background:rgba(232,197,193,0.35); transform:translateY(-1px); }
.nav button.active{ background:var(--blush); color:var(--ink); box-shadow:0 4px 14px rgba(176,127,122,0.25); }
@media (max-width:720px){ .nav button.util .tx{ display:none; } .nav button{ padding:9px 11px; } }

.hero{ min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 22px; position:relative; overflow:hidden; }
.hero .star{ font-size:26px; color:var(--rose); animation:twinkle 4s ease-in-out infinite; }
.hero .foryou{ font-family:var(--serif); font-style:italic; font-weight:500; font-size:clamp(30px,7vw,52px); color:var(--deep-rose); margin-top:20px; }
.hero .cities{ font-family:var(--serif); font-style:italic; font-weight:500; font-size:clamp(46px,11vw,104px); line-height:0.98; letter-spacing:-0.02em; margin-top:14px; color:var(--ink); }
.hero .cities .amp{ color:var(--rose); }
.hero .days{ font-family:var(--sans); text-transform:uppercase; letter-spacing:0.32em; font-size:13px; font-weight:500; color:var(--muted); margin-top:24px; }
.hero .when{ font-family:var(--serif); font-style:italic; font-size:clamp(19px,4vw,26px); color:var(--deep-rose); margin-top:6px; }
.btn{ display:inline-flex; align-items:center; gap:10px; font-family:var(--sans); font-weight:600; font-size:16px; color:var(--ink); background:linear-gradient(180deg,#F0D6D3 0%, var(--blush) 60%, var(--rose) 100%); border:1px solid rgba(255,255,255,0.6); padding:17px 32px; border-radius:var(--r-pill); margin-top:44px; cursor:pointer; box-shadow:0 1px 0 rgba(255,255,255,0.7) inset,0 10px 24px rgba(176,127,122,0.30),0 2px 6px rgba(176,127,122,0.20); transition:transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s; }
.btn:hover{ transform:translateY(-3px) scale(1.015); box-shadow:0 1px 0 rgba(255,255,255,0.8) inset,0 16px 36px rgba(176,127,122,0.38),0 4px 10px rgba(176,127,122,0.25); }
.btn .arrow{ transition:transform .25s; } .btn:hover .arrow{ transform:translateX(4px); }
.petals{ position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:-1; }
.petal{ position:absolute; top:-8%; width:14px; height:14px; background:radial-gradient(circle at 30% 30%, #F3DEDB, var(--blush)); border-radius:80% 0 80% 0; opacity:0.55; animation:fall linear infinite; will-change:transform; }
@keyframes fall{ 0%{ transform:translateY(-10vh) translateX(0) rotate(0deg);} 100%{ transform:translateY(112vh) translateX(40px) rotate(360deg);} }
@keyframes twinkle{ 0%,100%{ opacity:.4; transform:scale(.9);} 50%{ opacity:1; transform:scale(1.1);} }
@media (prefers-reduced-motion: reduce){ .petal,.hero .star{ animation:none !important; } .petals{ display:none; } }

.city-head{ text-align:center; margin-bottom:24px; }
.city-head .city{ font-family:var(--serif); font-style:italic; font-weight:500; font-size:clamp(46px,10vw,88px); line-height:1; color:var(--ink); letter-spacing:-0.01em; }
.city-head .sub{ font-family:var(--serif); font-style:italic; font-size:clamp(17px,3.4vw,23px); color:var(--deep-rose); margin-top:8px; }

.toggle{ display:flex; gap:6px; background:var(--glass); border:1px solid rgba(232,197,193,0.6); padding:6px; border-radius:var(--r-pill); box-shadow:var(--soft); margin:0 auto 26px; max-width:100%; width:max-content; overflow-x:auto; scrollbar-width:none; }
.toggle::-webkit-scrollbar{ display:none; }
.toggle button{ flex:0 0 auto; font-family:var(--sans); font-weight:600; font-size:13.5px; color:var(--deep-rose); background:transparent; border:none; cursor:pointer; padding:10px 16px; border-radius:var(--r-pill); white-space:nowrap; transition:background .2s,color .2s; }
.toggle button.active{ background:var(--blush); color:var(--ink); box-shadow:0 4px 12px rgba(176,127,122,0.22); }

.cat-panel{ display:none; } .cat-panel.active{ display:block; animation:viewIn .45s cubic-bezier(.2,.8,.2,1); }

.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(270px,1fr)); gap:22px; }
@media (max-width:680px){ .grid{ grid-template-columns:1fr 1fr; gap:14px; } }
@media (max-width:420px){ .grid{ grid-template-columns:1fr; } }

.card{ position:relative; background:var(--surface); border-radius:var(--r-card); box-shadow:var(--soft); border:1px solid rgba(232,197,193,0.4); overflow:hidden; cursor:pointer; display:flex; flex-direction:column; transition:transform .25s, box-shadow .25s; }
.card:hover{ transform:translateY(-4px) scale(1.01); box-shadow:var(--soft-hover); }
.card:focus-visible{ outline:3px solid var(--rose); outline-offset:2px; }
.card.feature{ border-color:rgba(201,169,110,0.55); }
.thumb{ position:relative; aspect-ratio:4/3; overflow:hidden; display:flex; align-items:center; justify-content:center; background:linear-gradient(145deg,#F8E7E5 0%, var(--blush) 65%, var(--rose) 100%); }
.thumb[data-base="coffee"]{ background:linear-gradient(145deg,#F6ECE0,#EAD2C4 70%,#D9B6A6); }
.thumb[data-base="matcha"]{ background:linear-gradient(145deg,#EAF1DE,#C8DBAB 70%,#9FBE73); }
.thumb[data-base="pubs"]{ background:linear-gradient(145deg,#F3DEDB,#D9A8A2 70%,#B07F7A); }
.thumb[data-base="landmarks"]{ background:linear-gradient(145deg,#F6E8DE,#E6C9A8 70%,#C9A96E); }
.thumb[data-base="parks"]{ background:linear-gradient(145deg,#E4EFD9,#BCD7A6 70%,#8FB46A); }
.thumb img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .55s; }
.thumb img.loaded{ opacity:1; }
.thumb-emoji{ font-size:44px; opacity:.55; filter:saturate(.85); }
.thumb::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 50%, rgba(28,26,26,.30)); pointer-events:none; }
.thumb-badge{ position:absolute; top:11px; left:11px; z-index:2; font-family:var(--sans); font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:0.05em; color:#5b4a2e; background:linear-gradient(180deg,#F4E4C4,var(--gold)); padding:5px 11px; border-radius:var(--r-pill); box-shadow:0 6px 16px rgba(201,169,110,0.35); border:1px solid rgba(255,255,255,0.5); max-width:calc(100% - 22px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.thumb-badge.rose{ color:#fff; background:linear-gradient(180deg,var(--rose),var(--deep-rose)); box-shadow:0 6px 16px rgba(176,127,122,0.35); }
.thumb-chip{ position:absolute; top:11px; right:11px; z-index:2; font-family:var(--sans); font-weight:700; font-size:12px; letter-spacing:0.5px; background:var(--glass); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.6); padding:5px 10px; border-radius:var(--r-pill); color:var(--gold); }
.thumb-chip .off{ color:rgba(201,169,110,0.30); }
.thumb-chip.free{ color:#5a7a5a; } .thumb-chip.paid{ color:var(--deep-rose); }
.thumb-rating{ position:absolute; left:11px; bottom:11px; z-index:2; display:none; align-items:center; gap:4px; font-family:var(--sans); font-weight:600; font-size:12px; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.4); }
.thumb-rating.on{ display:inline-flex; } .thumb-rating .s{ color:#F4D27A; }
.card-body{ padding:15px 16px 16px; display:flex; flex-direction:column; gap:7px; flex:1; }
.card-body .name{ font-family:var(--sans); font-weight:600; font-size:18px; letter-spacing:-0.02em; line-height:1.15; color:var(--ink); }
.card-body .cuisine{ font-family:var(--serif); font-style:italic; font-size:15.5px; color:var(--deep-rose); line-height:1.3; }
.card-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:auto; padding-top:6px; }
.card-tags .tag{ font-family:var(--sans); font-weight:500; font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--deep-rose); background:rgba(232,197,193,0.28); border:1px solid rgba(232,197,193,0.5); padding:4px 9px; border-radius:var(--r-pill); }
.card-more{ font-family:var(--sans); font-weight:600; font-size:12px; color:var(--deep-rose); margin-top:8px; display:flex; align-items:center; gap:5px; }
.card:hover .card-more .ar{ transform:translateX(3px); } .card-more .ar{ transition:transform .2s; }

.modal-backdrop{ position:fixed; inset:0; z-index:100; background:rgba(28,26,26,.45); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .3s; }
@media (min-width:700px){ .modal-backdrop{ align-items:center; padding:24px; } }
.modal-backdrop.open{ opacity:1; pointer-events:auto; }
.modal{ background:var(--surface); width:100%; max-width:580px; max-height:92vh; overflow-y:auto; border-radius:26px 26px 0 0; box-shadow:var(--soft-hover); transform:translateY(40px); transition:transform .38s cubic-bezier(.2,.8,.2,1); -webkit-overflow-scrolling:touch; }
@media (min-width:700px){ .modal{ border-radius:28px; transform:scale(.95); } }
.modal-backdrop.open .modal{ transform:none; }
@media (prefers-reduced-motion: reduce){ .modal,.modal-backdrop{ transition:none; } }
.modal-hero{ position:relative; aspect-ratio:16/10; display:flex; align-items:center; justify-content:center; overflow:hidden; background:linear-gradient(145deg,#F8E7E5,var(--blush) 65%,var(--rose)); }
.modal-hero img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform-origin:50% 42%; animation:kenburns 17s ease-out both; }
@keyframes kenburns{ from{ transform:scale(1.001);} to{ transform:scale(1.10);} }
@media (prefers-reduced-motion: reduce){ .modal-hero img{ animation:none; } }
.modal-hero .emoji{ font-size:64px; opacity:.55; }
.modal-hero::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.05),transparent 30%, transparent 70%, rgba(28,26,26,.25)); }
.modal-close{ position:absolute; top:14px; right:14px; z-index:3; width:38px; height:38px; border-radius:50%; border:1px solid rgba(255,255,255,0.6); background:var(--glass); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); color:var(--ink); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(176,127,122,.25); transition:transform .2s, background .2s; }
.modal-close:hover{ transform:scale(1.08); background:#fff; }
.modal-hero .m-badge{ position:absolute; top:16px; left:16px; z-index:3; font-family:var(--sans); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:#5b4a2e; background:linear-gradient(180deg,#F4E4C4,var(--gold)); padding:6px 13px; border-radius:var(--r-pill); box-shadow:0 6px 16px rgba(201,169,110,0.4); border:1px solid rgba(255,255,255,0.5); }
.modal-hero .m-badge.rose{ color:#fff; background:linear-gradient(180deg,var(--rose),var(--deep-rose)); }
.modal-thumbs{ display:flex; gap:8px; padding:12px 22px 0; overflow-x:auto; scrollbar-width:none; }
.modal-thumbs::-webkit-scrollbar{ display:none; }
.modal-thumbs button{ flex:0 0 auto; width:64px; height:48px; border-radius:12px; overflow:hidden; border:2px solid transparent; padding:0; cursor:pointer; background:var(--blush); }
.modal-thumbs button.active{ border-color:var(--rose); }
.modal-thumbs img{ width:100%; height:100%; object-fit:cover; }
.modal-body{ padding:20px 24px 28px; }
.modal-body .label{ display:block; }
.modal-body h2{ font-family:var(--sans); font-weight:600; font-size:26px; letter-spacing:-0.02em; line-height:1.12; margin:6px 0 2px; }
.modal-body .m-meta-row{ display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin:8px 0 14px; }
.m-price{ font-family:var(--sans); font-weight:700; font-size:16px; letter-spacing:1px; color:var(--gold); } .m-price .off{ color:rgba(201,169,110,0.30); }
.m-entry{ display:inline-flex; align-items:center; gap:6px; font-family:var(--sans); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.07em; padding:5px 12px; border-radius:var(--r-pill); }
.m-entry.free{ color:#5a7a5a; background:rgba(180,205,170,0.30); } .m-entry.paid{ color:var(--deep-rose); background:rgba(232,197,193,0.40); }
.m-rating{ display:inline-flex; align-items:center; gap:6px; font-family:var(--sans); font-weight:600; font-size:14px; color:var(--ink); }
.m-rating .s{ color:var(--gold); } .m-rating .c{ color:var(--muted); font-weight:500; font-size:12.5px; }
.modal-body .cuisine{ font-family:var(--serif); font-style:italic; font-size:19px; color:var(--deep-rose); line-height:1.3; margin-bottom:12px; }
.modal-body .summary{ font-size:15px; color:#4a4140; line-height:1.65; }
.modal-body .must{ font-size:14px; color:#4a4140; margin-top:10px; } .modal-body .must b{ color:var(--deep-rose); }
.tip{ font-size:14px; color:#4a4140; line-height:1.55; background:rgba(232,197,193,0.18); border-left:2px solid var(--blush); padding:11px 13px; border-radius:0 12px 12px 0; margin-top:14px; } .tip b{ color:var(--deep-rose); }
.modal-body .walk{ font-size:13px; color:var(--muted); margin-top:12px; } .modal-body .walk b{ color:var(--deep-rose); font-weight:600; }
.modal-tags{ display:flex; flex-wrap:wrap; gap:7px; margin-top:16px; }
.modal-tags .tag{ font-family:var(--sans); font-weight:500; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--deep-rose); background:rgba(232,197,193,0.28); border:1px solid rgba(232,197,193,0.5); padding:5px 11px; border-radius:var(--r-pill); }
.modal-actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
.chip-link{ display:inline-flex; align-items:center; gap:7px; font-family:var(--sans); font-weight:600; font-size:13.5px; color:var(--deep-rose); background:rgba(232,197,193,0.22); border:1px solid rgba(232,197,193,0.55); padding:11px 18px; border-radius:var(--r-pill); transition:background .2s, transform .2s, color .2s; cursor:pointer; }
.chip-link:hover{ background:var(--blush); color:var(--ink); transform:translateY(-1px); }
.chip-link.solid{ background:var(--blush); color:var(--ink); } .chip-link.solid:hover{ background:var(--rose); }

.map-frame{ position:relative; aspect-ratio:16/9; border-radius:var(--r-card); overflow:hidden; box-shadow:var(--soft); border:1px solid rgba(232,197,193,0.5); background:#F5E6E4; }
@media (max-width:640px){ .map-frame{ aspect-ratio:4/5; } }
.map-frame > #map-canvas, .map-frame > iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
#map-canvas{ display:none; } .map-frame iframe{ filter:saturate(0.85) hue-rotate(-6deg) brightness(1.03); }
.map-frame.live #map-canvas{ display:block; } .map-frame.live iframe{ display:none; }
.map-note{ font-size:12.5px; color:var(--muted); margin-top:12px; }
.hoods{ display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
.hoods .hood-chip{ font-family:var(--sans); font-weight:500; font-size:12px; color:var(--deep-rose); background:var(--surface); border:1px solid rgba(232,197,193,0.55); padding:8px 14px; border-radius:var(--r-pill); box-shadow:0 2px 8px rgba(176,127,122,0.08); }

.train{ background:linear-gradient(180deg,#FFFFFF,#FEF7F6); border:1px solid rgba(232,197,193,0.5); border-radius:var(--r-card); box-shadow:var(--soft); padding:26px 24px; display:grid; gap:14px; margin-bottom:26px; }
.train .route{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.train .stop{ font-family:var(--serif); font-style:italic; font-size:clamp(20px,4vw,28px); color:var(--ink); }
.train .dash{ flex:1; min-width:40px; height:2px; background:repeating-linear-gradient(90deg,var(--blush) 0 8px, transparent 8px 16px); position:relative; }
.train .dash::after{ content:"🚆"; position:absolute; right:-4px; top:-13px; font-size:18px; }
.train .facts{ display:flex; flex-wrap:wrap; gap:22px; }
.train .fact .label{ display:block; margin-bottom:2px; } .train .fact .val{ font-family:var(--sans); font-weight:600; font-size:15px; color:var(--ink); }
.train .note{ font-size:14px; color:#4a4140; }

footer{ text-align:center; padding:40px 22px 24px; }
footer .heart{ font-size:22px; color:var(--rose); }
footer .line{ font-family:var(--serif); font-style:italic; font-size:24px; color:var(--deep-rose); margin-top:14px; }
footer .small{ font-size:12px; color:var(--muted); margin-top:8px; letter-spacing:0.04em; }

/* ---- flags ---- */
.flag{ display:inline-flex; width:20px; height:13px; border-radius:3px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.18); vertical-align:middle; flex:0 0 auto; }
.flag svg{ width:100%; height:100%; display:block; }
.nav button .flag{ width:17px; height:11px; margin-right:5px; }
.city-row{ display:inline-flex; align-items:center; gap:13px; justify-content:center; }
.city-row .flag{ width:36px; height:24px; border-radius:5px; box-shadow:0 2px 8px rgba(176,127,122,.25); }

.btn::after{ content:""; position:absolute; top:0; bottom:0; left:-70%; width:45%; background:linear-gradient(100deg, transparent, rgba(255,255,255,.6), transparent); transform:skewX(-18deg); animation:sheen 4.8s ease-in-out infinite; pointer-events:none; }
@keyframes sheen{ 0%{ left:-70%; } 22%,100%{ left:130%; } }

  { id:"dickies-bar", dest:"london", cat:"pubs", name:"Dickie's Bar", hood:"Upper Grosvenor St, Mayfair",
    cuisine:"Secret whisky bar — Michelin-chef bar food", price:3, walkIn:"Walk-in: yes, but intimate — can fill up",
    summary:"Hidden inside Corrigan's Mayfair, this is one of the city's best-kept secrets. Rare Irish whiskeys, perfectly poured Guinness, Michelin-starred bar snacks (smoked eel croquettes, quail scotch eggs). The ideal Mayfair nightcap.",
    tags:["hidden gem","whisky","nightcap"], badge:"hidden gem" },

  { id:"red-room", dest:"london", cat:"pubs", name:"The Red Room · The Connaught", hood:"Carlos Place, Mayfair",
    cuisine:"Hotel wine bar — blush-pink walls, art by women", price:4, walkIn:"Walk-in welcome · can be busy",
    summary:"Hidden inside The Connaught hotel. An intimate wine bar with blush-pink walls, stained glass, and art from four female artists. The wine list is legendary (pulled from the hotel's historic cellars) and cocktails are wine-inspired. Genuinely the most romantic bar in London.",
    tags:["most romantic","blush walls","cocktails"], badge:"most romantic bar", badgeRose:true, feature:true },

  /* ===================== LONDON · LANDMARKS ===================== */
  { id:"va", dest:"london", cat:"landmarks", name:"Victoria & Albert Museum", hood:"South Kensington, SW7",
    entry:"free",
    tip:"Book free entry online. Head straight to the Fashion gallery and the Cast Courts (enormous Victorian plaster casts — jaw-dropping). The café is in a stunning ornate room.",
    summary:"The world's greatest museum of art, design, and fashion. Five floors of everything from medieval armour to Alexander McQueen gowns. She'll love the Fashion gallery. Budget half a day minimum — it's impossible to rush.",
    tags:["fashion","free","half a day"] },

  { id:"nhm", dest:"london", cat:"landmarks", name:"Natural History Museum", hood:"South Kensington, SW7",
    entry:"free",
    tip:"Book timed entry online. The blue whale 'Hope' in Hintze Hall is one of the most beautiful things in London. Go first thing or late afternoon to dodge crowds.",
    summary:"Dinosaur skeletons, 80 million specimens, and one of London's most beautiful Victorian buildings. The suspended blue whale alone is worth the visit. Right next to the V&A — do both in one South Kensington morning.",
    tags:["dinosaurs","free","Victorian"] },

  { id:"tate-modern", dest:"london", cat:"landmarks", name:"Tate Modern", hood:"Bankside, SE1",
    entry:"free",
    tip:"Walk across the Millennium Bridge from St Paul's for the best approach. Friday late openings (10pm) are more romantic and less crowded.",
    summary:"London's modern and contemporary art museum inside a dramatic converted power station. The Turbine Hall always has a spectacular installation. Walk across the Millennium Bridge afterward for one of London's best views.",
    tags:["modern art","free","river views"] },

  { id:"national-gallery", dest:"london", cat:"landmarks", name:"National Gallery", hood:"Trafalgar Square, WC2",
    entry:"free",
    tip:"Friday late opening to 9pm — quieter, more atmospheric. Go to Room 34 for the Impressionists (Monet, Renoir, Van Gogh's Sunflowers).",
    summary:"2,300 paintings from 1300–1900, including da Vinci, Vermeer, Turner, and Van Gogh's Sunflowers. One of the finest art collections on earth, all free. Trafalgar Square outside is one of London's great public spaces.",
    tags:["paintings","free","Sunflowers"] },

  { id:"tower-of-london", dest:"london", cat:"landmarks", name:"Tower of London", hood:"Tower Hill, EC3",
    entry:"paid · ~£34",
    tip:"Book online in advance — cheaper and you skip queues. Don't miss the Crown Jewels (arrive early, queues build fast). The Yeoman Warder tours are genuinely good.",
    summary:"Over 900 years of royal history in a riverside fortress. Home of the Crown Jewels, including the 530-carat Cullinan I — the largest colourless cut diamond in the world. Walk the medieval walls, see the ravens, take the Yeoman Warder tour.",
    tags:["Crown Jewels","history","ravens"] },

  { id:"kensington-palace", dest:"london", cat:"landmarks", name:"Kensington Palace", hood:"Kensington Gardens, W8",
    entry:"paid · ~£22",
    tip:"Combine with a walk through Kensington Gardens to the Diana Memorial Fountain. The palace gift shop has beautiful things.",
    summary:"The home of Princess Diana, now home to William and Kate. See the State Rooms, Diana's dresses, and the beautiful Sunken Garden. Kensington Gardens surrounds it — one of London's loveliest parks for a wander.",
    tags:["Diana","royal","gardens"] },

  { id:"sky-garden", dest:"london", cat:"landmarks", name:"Sky Garden", hood:"Fenchurch St (Walkie Talkie), EC3",
    entry:"free · book ahead",
    tip:"Book weeks ahead at skygarden.london — it sells out. Evening slots give the best city views. No photography restrictions.",
    summary:"A free rooftop garden 35 floors above the City, with 360° panoramic views. Tropical plants, a bar, and one of London's best free views. Book evening for sunset over the Thames — spectacular and completely free.",
    tags:["rooftop","free","sunset"] },

  { id:"borough-market", dest:"london", cat:"landmarks", name:"Borough Market", hood:"London Bridge, SE1",
    entry:"free",
    tip:"Go on a weekday morning (less crowded). Try the Raclette stall, the Ethiopian injera stand, and the Spanish jamón. Coffee at Monmouth inside the market.",
    summary:"London's oldest and most celebrated food market, under the Victorian railway arches near London Bridge. Sample everything — the best way to eat your way through London in one morning. Beautiful for photography.",
    tags:["food market","free","photogenic"] },

  { id:"portobello", dest:"london", cat:"landmarks", name:"Portobello Road Market", hood:"Notting Hill, W11",
    entry:"free",
    tip:"Saturday is the biggest day — arrive by 10am. Antiques at the Notting Hill Gate end; street food and vintage toward Ladbroke Grove.",
    summary:"London's most famous street market, stretching down a colourful hill through Notting Hill. Antiques, vintage fashion, street food, buskers. The pastel houses make it one of the most photogenic streets in the city. Perfect Saturday morning.",
    tags:["market","pastel houses","Saturday"] },

  { id:"the-shard", dest:"london", cat:"landmarks", name:"The View from The Shard", hood:"London Bridge, SE1",
    entry:"paid · ~£32",
    tip:"Book a sunset slot. Cheaper free alternatives: Sky Garden or Horizon 22 (horizon22.co.uk).",
    summary:"Europe's tallest building offers 360° views from 244 metres above London. The view at sunset, with the Thames winding through the city, is extraordinary. Worth splurging on for one evening — book the latest possible slot.",
    tags:["views","sunset","splurge"] },

  /* ---------- LONDON · RESTAURANTS (fine dining / Michelin) ---------- */
  { id:"core-clare-smyth", dest:"london", cat:"restaurants", name:"Core by Clare Smyth", hood:"Notting Hill, W11",
    cuisine:"Modern British — produce-led tasting menus", price:4,
    bookingUrl:"https://www.corebyclaresmyth.com", bookingLabel:"Book",
    walkIn:"Booking essential — books open well in advance.",
    summary:"Clare Smyth's three-Michelin-star flagship and one of the UK's very best restaurants — the first British female chef to hold three stars. Deceptively simple British produce taken to dizzying heights ('potato and roe' is legendary), in a softly elegant Notting Hill room. A once-in-a-trip splurge.",
    tags:["michelin ★★★","fine dining","splurge","iconic"], badge:"Michelin ★★★", badgeRose:true, feature:true },

  { id:"sketch", dest:"london", cat:"restaurants", name:"Sketch", hood:"Mayfair, W1",
    cuisine:"Modern French — and the famous pink room", price:4,
    bookingUrl:"https://sketch.london", bookingLabel:"Book",
    walkIn:"Gallery & Glade take some walk-ins; the Lecture Room needs booking.",
    summary:"The most Instagrammed room in London — the blush-pink Gallery, all velvet and David Shrigley drawings, with afternoon tea and the famous egg-pod loos. Upstairs, the three-Michelin-star Lecture Room & Library is pure gilded indulgence. Come for the pink, stay for the spectacle.",
    tags:["pink room","michelin","afternoon tea","iconic"], badge:"the pink room", badgeRose:true, feature:true },

  { id:"helene-darroze", dest:"london", cat:"restaurants", name:"Hélène Darroze at The Connaught", hood:"Mayfair, W1",
    cuisine:"Haute French — Landes produce", price:4,
    bookingUrl:"https://www.the-connaught.co.uk/restaurants-bars/helene-darroze-at-the-connaught/", bookingLabel:"Book",
    walkIn:"Booking essential.",
    summary:"Three Michelin stars inside The Connaught — Hélène Darroze cooks the produce of her native south-west France with serious soul. Pick your courses from a beautiful coloured-bead board. Refined, warm, and a true special-occasion room.",
    tags:["michelin ★★★","French","fine dining","splurge"], badge:"Michelin ★★★" },

  { id:"gordon-ramsay-rhr", dest:"london", cat:"restaurants", name:"Restaurant Gordon Ramsay", hood:"Chelsea, SW3",
    cuisine:"Haute French", price:4,
    bookingUrl:"https://www.gordonramsayrestaurants.com/restaurant-gordon-ramsay/", bookingLabel:"Book",
    walkIn:"Booking essential.",
    summary:"Ramsay's three-Michelin-star Chelsea mothership on Royal Hospital Road — the restaurant that made his name and has held three stars for over two decades. Classical French precision, faultless service, a hushed jewel-box room.",
    tags:["michelin ★★★","French","iconic","splurge"], badge:"Michelin ★★★" },

  { id:"a-wong", dest:"london", cat:"restaurants", name:"A. Wong", hood:"Victoria, SW1",
    cuisine:"Chinese — regional China, dim sum", price:3,
    bookingUrl:"https://www.awong.co.uk", bookingLabel:"Book",
    walkIn:"Book ahead — dim sum lunch is the value sweet spot.",
    summary:"The only Chinese restaurant in Europe with two Michelin stars. Andrew Wong reinvents dishes from across China's provinces — the lunchtime dim sum is revelatory, the 'Taste of China' tasting menu a proper journey. Smart but unstuffy.",
    tags:["michelin ★★","dim sum","award","date night"], badge:"Michelin ★★" },

  { id:"ikoyi", dest:"london", cat:"restaurants", name:"Ikoyi", hood:"St James's, SW1",
    cuisine:"Sub-Saharan-inspired, spice-led tasting", price:4,
    bookingUrl:"https://www.ikoyilondon.com", bookingLabel:"Book",
    walkIn:"Booking essential.",
    summary:"Two Michelin stars and one of the most original kitchens in the world — chef Jeremy Chan builds intense, spice-driven dishes around British produce and West African flavour. Adventurous, beautiful, and unlike anywhere else in London.",
    tags:["michelin ★★","adventurous","tasting menu"], badge:"Michelin ★★" },

  { id:"gymkhana", dest:"london", cat:"restaurants", name:"Gymkhana", hood:"Mayfair, W1",
    cuisine:"Indian — Raj-era club glamour", price:3,
    bookingUrl:"https://www.gymkhanalondon.com", bookingLabel:"Book",
    walkIn:"Book ahead; bar seats sometimes walk-in.",
    summary:"London's most lauded Indian restaurant — two Michelin stars, styled like a colonial-era sporting club with ceiling fans and dark wood. The wild muntjac biryani and the kid-goat methi are the stuff of legend. Buzzy, fun, delicious.",
    tags:["michelin ★★","Indian","iconic","date night"], badge:"Michelin ★★" },

  { id:"kitchen-table", dest:"london", cat:"restaurants", name:"Kitchen Table", hood:"Fitzrovia, W1",
    cuisine:"Chef's-counter tasting menu", price:4,
    bookingUrl:"https://kitchentablelondon.co.uk", bookingLabel:"Book",
    walkIn:"Counter only — booking essential.",
    summary:"Hidden behind a hot-dog bar, this 19-seat chef's counter holds two Michelin stars. Watch James Knappett and team cook a surprise British tasting menu inches in front of you while they call each dish by name. Intimate, theatrical, special.",
    tags:["michelin ★★","chef's counter","hidden gem","tasting menu"], badge:"Michelin ★★" },

  { id:"kol", dest:"london", cat:"restaurants", name:"Kol", hood:"Marylebone, W1",
    cuisine:"Mexican — British produce, mezcal", price:3,
    bookingUrl:"https://kolrestaurant.com", bookingLabel:"Book",
    walkIn:"Mezcalería bar downstairs is walk-in.",
    summary:"Michelin-starred Mexican that swaps imports for British produce — Santiago Lastra's tacos, moles and aguachiles are some of the most exciting food in town. The candlelit Mezcalería downstairs is a brilliant date-night drink.",
    tags:["michelin ★","Mexican","date night","mezcal"], badge:"Michelin ★" },

  { id:"brat", dest:"london", cat:"restaurants", name:"Brat", hood:"Shoreditch, E1",
    cuisine:"Wood-fired Basque-inspired", price:3,
    bookingUrl:"https://www.bratrestaurant.com", bookingLabel:"Book",
    walkIn:"Some walk-in seats; book to be safe.",
    summary:"A Michelin star for live-fire cooking above a Shoreditch pub — the whole turbot grilled over coals is a rite of passage. Warm, smoky, unfussy and consistently one of London's most loved kitchens.",
    tags:["michelin ★","wood-fired","hidden gem"], badge:"Michelin ★" },

  { id:"clove-club", dest:"london", cat:"restaurants", name:"The Clove Club", hood:"Shoreditch, EC1",
    cuisine:"Modern British tasting menu", price:4,
    bookingUrl:"https://thecloveclub.com", bookingLabel:"Book",
    walkIn:"Booking essential.",
    summary:"Set in Shoredich Town Hall, this Michelin-starred room serves a precise, produce-driven British tasting menu — the buttermilk fried chicken and pine-cured trout are signatures. A perennial World's-50-Best regular.",
    tags:["michelin ★","tasting menu","award"], badge:"Michelin ★" },

  { id:"st-john", dest:"london", cat:"restaurants", name:"St. JOHN", hood:"Smithfield, EC1",
    cuisine:"British nose-to-tail", price:3,
    bookingUrl:"https://stjohnrestaurant.com", bookingLabel:"Book",
    walkIn:"Bar & bakery are walk-in; dining room book ahead.",
    summary:"Fergus Henderson's whitewashed Smithfield icon — the most influential British restaurant of its generation and a past World's-50-Best winner. Roast bone marrow with parsley salad, then the famous Eccles cake with Lancashire cheese. A pilgrimage.",
    tags:["iconic","British","award","nose-to-tail"], badge:"modern classic" },

  /* ---------- LONDON · COFFEE (specialty) ---------- */
  { id:"monmouth", dest:"london", cat:"coffee", name:"Monmouth Coffee", hood:"Borough & Covent Garden", price:2,
    mustTry:"Filter of the day · cappuccino", walkIn:"Walk-in: yes (expect a queue)",
    summary:"London's specialty-coffee pioneer since 1978. The tiny Borough counter beside the market, with shared wooden tables and a pastry from the neighbours, is a proper London morning ritual.",
    tags:["specialty","iconic","Borough"] },

  { id:"kaffeine", dest:"london", cat:"coffee", name:"Kaffeine", hood:"Fitzrovia, W1", price:2,
    mustTry:"Flat white · seasonal toast", walkIn:"Walk-in: yes",
    summary:"Antipodean-run and routinely voted among London's best coffee. Friendly, polished, with excellent flat whites and a tidy little food counter. A reliable Fitzrovia pick-me-up.",
    tags:["specialty","flat white","Antipodean"] },

  { id:"watchhouse", dest:"london", cat:"coffee", name:"WatchHouse", hood:"Bermondsey · multiple", price:2,
    mustTry:"House espresso blend · oat flat white", walkIn:"Walk-in: yes",
    summary:"A chic London specialty mini-chain born in a tiny Bermondsey watchman's hut. Beautiful interiors, own-roasted beans, very good pastries — the design-led coffee stop.",
    tags:["specialty","design-led","chic"] },

  /* ---------- LONDON · MATCHA ---------- */
  { id:"how-matcha", dest:"london", cat:"matcha", name:"How Matcha", hood:"Marylebone & Notting Hill", price:2,
    mustTry:"Iced ceremonial matcha · the 'Dirty Matcha'", walkIn:"Walk-in: yes",
    summary:"One of London's most popular all-day matcha bars, ceremonial-grade sourced direct from farms in Kagoshima. Try the Dirty Matcha (with a shot of espresso) — and the Notting Hill branch is the prettier of the two.",
    tags:["ceremonial","all-day","Kagoshima"], badge:"matcha pick", badgeRose:true },

  { id:"tsujiri", dest:"london", cat:"matcha", name:"Tsujiri", hood:"Chinatown, WC2", price:2,
    mustTry:"Matcha soft-serve parfait · matcha latte", walkIn:"Walk-in: yes",
    summary:"A Kyoto matcha house founded in 1860, now in Chinatown. Matcha in every form — intense soft-serve, parfaits, crepe cake, bubble tea — using high-grade gyokuro. Not too sweet, properly green.",
    tags:["Kyoto","dessert","soft-serve"] },

  { id:"tea-parlour", dest:"london", cat:"matcha", name:"Tea Parlour", hood:"near Trafalgar Sq, WC2", price:2,
    mustTry:"Single-origin Uji ceremonial matcha", walkIn:"Walk-in: yes",
    summary:"Purist single-origin matcha from Uji, Kyoto, plus a fun bubble-tea side, a few minutes from the National Gallery. A serene central spot to whisk up after a museum morning.",
    tags:["Uji","ceremonial","central"] },

  { id:"cafe-kitsune", dest:"london", cat:"matcha", name:"Café Kitsuné", hood:"Belgravia, SW1", price:3,
    mustTry:"Matcha latte · yuzu madeleine", walkIn:"Walk-in: yes",
    summary:"Maison Kitsuné's chic Belgravia café — French patisserie with a Japanese accent and a very good matcha latte. Tiny, stylish, and extremely her aesthetic.",
    tags:["chic","Parisian-Japanese","pastries"] },

  /* ---------- LONDON · PUBS & BARS (more) ---------- */
  { id:"connaught-bar", dest:"london", cat:"pubs", name:"Connaught Bar", hood:"Carlos Place, Mayfair", price:4, walkIn:"Walk-in welcome early; busy later",
    summary:"Repeatedly ranked the World's Best Bar. The tableside martini trolley — where your drink is mixed in front of you with a choice of bitters — is one of London's great luxuries. Silver-leaf walls, impeccable service. Dress smart.",
    tags:["world's best","cocktails","martini","iconic"], badge:"World's Best Bar", badgeRose:true },

  { id:"american-bar-savoy", dest:"london", cat:"pubs", name:"American Bar · The Savoy", hood:"Strand, WC2", price:4, walkIn:"Walk-in; can queue — smart dress",
    summary:"The oldest surviving cocktail bar in Britain and the birthplace of countless classics. Live piano, art-deco glamour, white-jacketed bartenders. Order a Hanky Panky and feel the history.",
    tags:["historic","cocktails","live piano","iconic"] },

  { id:"tayer-elementary", dest:"london", cat:"pubs", name:"Tayēr + Elementary", hood:"Old Street, EC1", price:3, walkIn:"Walk-in (Elementary side); book the bar",
    summary:"A World's-50-Best two-in-one: casual 'Elementary' up front, refined 'Tayēr' cocktail counter behind. Some of the most inventive, low-waste cocktails in the city from Monica Berg & Alex Kratena.",
    tags:["cocktails","award","innovative"], badge:"World's 50 Best" },

  { id:"cheshire-cheese", dest:"london", cat:"pubs", name:"Ye Olde Cheshire Cheese", hood:"Fleet Street, EC4", price:1, walkIn:"Walk-in: yes",
    summary:"Rebuilt in 1667 after the Great Fire, a warren of dark, candlelit, low-ceilinged rooms down a Fleet Street alley. Dickens and Dr Johnson drank here. Order a pint and disappear into another century.",
    tags:["historic","candlelit","atmospheric"] },

  { id:"gordons-wine", dest:"london", cat:"pubs", name:"Gordon's Wine Bar", hood:"Embankment, WC2", price:2, walkIn:"Walk-in: yes — arrive early for the cave",
    summary:"London's oldest wine bar (1890): a candlelit, cave-like cellar with barrel tables, cheese and charcuterie, and zero pretension. Cramped, flickering and deeply romantic — get there early to bag a vault seat.",
    tags:["wine","candlelit","historic","romantic"], badge:"oldest wine bar" },

  /* ---------- LONDON · LANDMARKS (more + stadiums) ---------- */
  { id:"british-museum", dest:"london", cat:"landmarks", name:"The British Museum", hood:"Bloomsbury, WC1", entry:"free",
    tip:"Free; book a timed slot at busy periods. Head for the Rosetta Stone, the Egyptian mummies and the great glass-roofed Great Court.",
    summary:"Two million years of human history under one roof — the Rosetta Stone, the Parthenon sculptures, Egyptian mummies — and it's free. The Norman Foster Great Court is one of the most beautiful interior spaces in London.",
    tags:["free","history","iconic"] },

  { id:"st-pauls", dest:"london", cat:"landmarks", name:"St Paul's Cathedral", hood:"City of London, EC4", entry:"paid · ~£26",
    tip:"Climb the 528 steps to the Golden Gallery for a knockout City view. The Whispering Gallery carries a murmur right around the dome.",
    summary:"Wren's masterpiece and the City's great dome. Climb to the Whispering Gallery and on up for panoramic views, then walk the Millennium Bridge to Tate Modern. Beautiful at golden hour.",
    tags:["iconic","views","architecture"] },

  { id:"westminster-abbey", dest:"london", cat:"landmarks", name:"Westminster Abbey", hood:"Westminster, SW1", entry:"paid · ~£30",
    tip:"Book online. Don't miss Poets' Corner and the Cosmati pavement. Evensong (free) is a magical, quieter way to experience it.",
    summary:"The coronation church for a thousand years — where monarchs are crowned, married and buried. Gothic vaulting, royal tombs, Poets' Corner. Attend free Evensong to hear the choir fill the nave.",
    tags:["royal","historic","Gothic"] },

  { id:"tower-bridge", dest:"london", cat:"landmarks", name:"Tower Bridge", hood:"Tower Hill, SE1", entry:"paid · ~£13 (free to cross)",
    tip:"Free to walk across; pay for the high-level glass-floor walkways & Victorian engine rooms. Check the bridge-lift times to watch it open.",
    summary:"London's most photogenic bridge (often mistaken for London Bridge). Walk the glass-floored high walkways for a view straight down onto the road, or just cross it at dusk when it's lit.",
    tags:["iconic","river","views"] },

  { id:"buckingham-palace", dest:"london", cat:"landmarks", name:"Buckingham Palace", hood:"St James's, SW1", entry:"paid · State Rooms ~£32 (summer)",
    tip:"The State Rooms open in summer only (book ahead). Year-round, catch the Changing of the Guard, then walk through St James's Park.",
    summary:"The monarch's London home and the backdrop to the Changing of the Guard. In summer the lavish State Rooms open to visitors; the rest of the year, the railings, the Mall and the park around it are a lovely free wander.",
    tags:["royal","iconic","ceremony"] },

  { id:"stamford-bridge", dest:"london", cat:"landmarks", name:"Stamford Bridge — Chelsea FC", hood:"Fulham, SW6", entry:"paid · tour ~£28",
    tip:"Book the stadium tour + museum online; on non-match days you get the dressing rooms, tunnel and pitchside. Matchday tickets sell fast.",
    summary:"Home of Chelsea FC since 1905. The stadium tour takes you through the dressing rooms, players' tunnel and pitchside, plus the trophy-filled museum. A must if Jer's blue.",
    tags:["football","stadium","tour"] },

  { id:"emirates-stadium", dest:"london", cat:"landmarks", name:"Emirates Stadium — Arsenal", hood:"Holloway, N5", entry:"paid · tour ~£30",
    tip:"The self-guided audio tour (narrated partly by Ian Wright) is genuinely good. Combine with the Arsenal museum.",
    summary:"Arsenal's 60,000-seat home in north London. The self-guided 'Legends' tour gives you the dressing rooms, tunnel and directors' box, with the club museum alongside. A Gunners pilgrimage.",
    tags:["football","stadium","tour"] },

  { id:"spurs-stadium", dest:"london", cat:"landmarks", name:"Tottenham Hotspur Stadium", hood:"Tottenham, N17", entry:"paid · tour ~£30, Skywalk ~£60",
    tip:"For thrill-seekers, the rooftop 'Dare Skywalk' climbs to the top of the stand. Otherwise the regular tour covers tunnel & dressing rooms.",
    summary:"Widely rated the best club stadium in Europe — a vast, single-tier 'wall' of fans, a retractable pitch and a rooftop Dare Skywalk for the brave. Tours run on non-match days.",
    tags:["football","stadium","skywalk"] },

  /* ---------- LONDON · PARKS ---------- */
  { id:"hyde-park", dest:"london", cat:"parks", name:"Hyde Park", hood:"Central London, W2", entry:"free",
    tip:"Hire a pedalo on the Serpentine, or walk to the Diana Memorial Fountain. The Rose Garden by Hyde Park Corner is gorgeous in summer.",
    summary:"350 acres in the middle of the city — boating on the Serpentine, the Rose Garden, and Speakers' Corner. The classic central London picnic and stroll.",
    tags:["royal park","boating","central"] },

  { id:"regents-park", dest:"london", cat:"parks", name:"Regent's Park", hood:"Marylebone, NW1", entry:"free",
    tip:"Queen Mary's Gardens has 12,000 roses (peak: June). Climb Primrose Hill at the north end for the skyline.",
    summary:"London's most elegant royal park — Queen Mary's Rose Garden with 12,000 roses, a boating lake, formal avenues and the open-air theatre. Romantic in early summer.",
    tags:["roses","boating","romantic"] },

  { id:"st-james-park", dest:"london", cat:"parks", name:"St James's Park", hood:"Westminster, SW1", entry:"free",
    tip:"Stand on the Blue Bridge for the fairy-tale view to Buckingham Palace one way, the London Eye the other. Say hi to the resident pelicans.",
    summary:"The prettiest of the royal parks — a ribbon of lake with pelicans, weeping willows and the storybook view from the Blue Bridge to Buckingham Palace. Tiny and perfect.",
    tags:["royal park","views","romantic"] },

  { id:"kyoto-garden", dest:"london", cat:"parks", name:"Kyoto Garden · Holland Park", hood:"Kensington, W8", entry:"free",
    tip:"Go early to have the koi pond to yourself. Peacocks roam the wider park. Magical in autumn when the maples turn.",
    summary:"A perfect Japanese garden tucked inside Holland Park — tiered waterfalls, a koi pond, stone lanterns and Japanese maples, with peacocks strutting nearby. One of London's loveliest hidden corners.",
    tags:["Japanese garden","hidden gem","romantic"], badge:"hidden gem" },

  { id:"richmond-park", dest:"london", cat:"parks", name:"Richmond Park", hood:"Richmond, SW", entry:"free",
    tip:"Walk to King Henry's Mound for a protected, telescope view all the way to St Paul's. Keep your distance from the deer (especially autumn rut).",
    summary:"London's largest park and a National Nature Reserve — 600 wild red and fallow deer roam huge skies and ancient oaks. The Isabella Plantation blazes with azaleas in spring.",
    tags:["wild deer","nature","big skies"] },

  { id:"kew-gardens", dest:"london", cat:"parks", name:"Kew Gardens", hood:"Kew, Richmond", entry:"paid · ~£22",
    tip:"Book online. Don't miss the Palm House, the Temperate House and the Treetop Walkway. A full half-day, easily.",
    summary:"The Royal Botanic Gardens — a UNESCO World Heritage site and one of the world's great gardens. Victorian glasshouses, a treetop walkway, a Japanese gateway and 50,000 living plants.",
    tags:["botanical","glasshouses","UNESCO"] },

  { id:"primrose-hill", dest:"london", cat:"parks", name:"Primrose Hill", hood:"NW1", entry:"free",
    tip:"Bring a bottle and climb for sunset — the protected view across the whole skyline is one of the best in London.",
    summary:"A short, steep climb to the most beloved skyline view in London — the whole city laid out below. The classic spot for a sunset picnic with a bottle of something.",
    tags:["view","picnic","sunset"] },

function cardHTML(p){
  const emoji = CAT_META[p.cat].emoji;
  const feature = p.feature ? " feature" : "";
  const badge = p.badge ? `<div class="thumb-badge${p.badgeRose?" rose":""}">${p.badge}</div>` : "";
  const chip = p.entry
    ? `<div class="thumb-chip ${p.entry.startsWith("free")?"free":"paid"}">${p.entry.startsWith("free")?"FREE":"£ "+p.entry.replace(/^paid\s*·?\s*~?£?/,"")}</div>`
    : (p.price ? `<div class="thumb-chip">${priceMarkup(p.price)}</div>` : "");
  const cuisine = p.cuisine ? `<p class="cuisine">${p.cuisine}</p>` : "";
  const tags = (p.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join("");
  const tg = (p.tags||[]).map(t=>t.toLowerCase());
  const fMich = tg.some(t=>t.includes("michelin")) ? 1 : 0;
  const fAward = tg.some(t=>t.includes("award")) ? 1 : 0;
  const fHidden = (p.badge==="hidden gem" || tg.includes("hidden gem")) ? 1 : 0;
  const fFree = (p.entry && p.entry.startsWith("free")) ? 1 : 0;
  return `
  <article class="card${feature}" data-id="${p.id}" data-price="${p.price||""}" data-mich="${fMich}" data-award="${fAward}" data-hidden="${fHidden}" data-free="${fFree}" tabindex="0" role="button" aria-label="${p.name} — view details">
    <div class="thumb" data-base="${p.cat}">
      <span class="thumb-emoji" aria-hidden="true">${emoji}</span>
      ${badge}${chip}
      <span class="thumb-rating" id="cr-${p.id}"><span class="s">★</span><span class="v"></span></span>
    </div>
    <div class="card-body">
      <span class="label">${p.hood}</span>
      <h3 class="name">${p.name}</h3>
      ${cuisine}
      <div class="card-tags">${tags}</div>
      <span class="card-more">view details <span class="ar">→</span></span>
    </div>
  </article>`;
}

/* ---------- filter chips ---------- */
const tagHas = (p,s)=>(p.tags||[]).some(t=>t.toLowerCase().includes(s));
function filterBarHTML(places){
  const some = (fn)=>places.some(fn);
  const chips = [`<button class="active" data-f="all">All</button>`];
  if(some(p=>tagHas(p,"michelin"))) chips.push(`<button class="gold" data-f="mich">★ Michelin</button>`);
  if(some(p=>tagHas(p,"award"))) chips.push(`<button data-f="award">Award-winning</button>`);
  if(some(p=>p.badge==="hidden gem"||tagHas(p,"hidden gem"))) chips.push(`<button data-f="hidden">Hidden gem</button>`);
  [1,2,3,4].forEach(n=>{ if(some(p=>p.price===n)) chips.push(`<button data-f="p${n}">${"$".repeat(n)}</button>`); });
  if(some(p=>p.entry&&p.entry.startsWith("free"))) chips.push(`<button data-f="free">Free entry</button>`);
  return chips.length>1 ? `<div class="filterbar">${chips.join("")}</div>` : "";
}
function matchFilter(card,f){
  if(f==="all") return true;
  if(f==="mich") return card.dataset.mich==="1";
  if(f==="award") return card.dataset.award==="1";
  if(f==="hidden") return card.dataset.hidden==="1";
  if(f==="free") return card.dataset.free==="1";
  if(f[0]==="p") return card.dataset.price===f.slice(1);
  return true;
}

  <div class="facts"><div class="fact"><span class="label">Operator</span><span class="val">LNER · lner.co.uk</span></div><div class="fact"><span class="label">Duration</span><span class="val">~4.5 hours</span></div><div class="fact"><span class="label">Advance from</span><span class="val">~£30–40</span></div></div>
  <p class="note">Getting north: book in advance for cheap seats and grab a table seat — watch the North Yorkshire coast slide by.</p>
  <div class="modal-actions" style="margin-top:2px;"><a class="chip-link solid" href="https://www.lner.co.uk" target="_blank" rel="noopener">Book on LNER ↗</a></div></div>`;

/* ---------- build destination views dynamically ---------- */
const destRoot = document.getElementById("destinations");
DEST_ORDER.forEach(dest=>{
  const cats = CAT_ORDER.filter(c => PLACES.some(p=>p.dest===dest && p.cat===c));
  const meta = DEST_META[dest];
  const sec = document.createElement("section");
  sec.className = "view content"; sec.dataset.view = dest;
  const doodle = meta.image ? `<img src="${meta.image}" alt="${meta.name}">` : (DOODLE[dest]||"");
  let html = `<div class="wrap"><div class="city-head">
      <div class="doodle">${doodle}</div>
      <div class="city-row">${flagHTML(COUNTRY[dest])}<div class="city serif">${meta.name}</div></div>
      <div class="sub">${meta.tag}</div></div>`;
  html += `<div class="toggle" role="tablist">` +
    cats.map((c,i)=>`<button class="${i===0?"active":""}" data-cat="${c}">${CAT_META[c].emoji} ${CAT_META[c].label}</button>`).join("") + `</div>`;
  html += cats.map((c,i)=>{
    const places = PLACES.filter(p=>p.dest===dest && p.cat===c);
    const cards = places.map(cardHTML).join("");
    const extra = (dest==="scotland" && c==="restaurants") ? TRAIN_HTML : "";
    return `<div class="cat-panel ${i===0?"active":""}" data-cat="${c}">${extra}${filterBarHTML(places)}<div class="grid">${cards}</div></div>`;
  }).join("");
  html += `</div>`;
  sec.innerHTML = html;
  destRoot.appendChild(sec);

  // sub-tab wiring
  const toggle = sec.querySelector(".toggle");
  const panels = [...sec.querySelectorAll(".cat-panel")];
  toggle.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click",()=>{
      toggle.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      panels.forEach(pl=>pl.classList.toggle("active", pl.dataset.cat===b.dataset.cat));
    });
  });
  // filter wiring
  panels.forEach(panel=>{
    const fb = panel.querySelector(".filterbar"); if(!fb) return;
    const grid = panel.querySelector(".grid");
    fb.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click",()=>{
        fb.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
        btn.classList.add("active");
        const f = btn.dataset.f;
        grid.querySelectorAll(".card").forEach(card=>{ card.style.display = matchFilter(card,f) ? "" : "none"; });
      });
    });
  });
});

/* card click wiring (all cards now in DOM) */
document.querySelectorAll(".card").forEach(card=>{
  const id = card.dataset.id;
  card.addEventListener("click", ()=>openDetail(id));
  card.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openDetail(id); } });
});

function applyCardEnrichment(p){
  const e = ENRICH[p.id]; if(!e) return;
  const card = document.querySelector(`.card[data-id="${p.id}"]`); if(!card) return;
  if(e.photos && e.photos[0]){
    const thumb = card.querySelector(".thumb");
    if(!thumb.querySelector("img")){
      const img = new Image(); img.alt = p.name; img.loading = "lazy";
      img.onload = ()=>img.classList.add("loaded"); img.src = e.photos[0];
      thumb.appendChild(img);
    }
  }
  if(e.rating){
    const r = card.querySelector(`#cr-${p.id}`);
    if(r){ r.querySelector(".v").textContent = " " + e.rating.toFixed(1); r.classList.add("on"); }
  }
}

/* ---------- detail sheet ---------- */
const modal = document.getElementById("modal");
const modalCard = document.getElementById("modalCard");
let lastFocus = null;

function detailHTML(p){
  const e = ENRICH[p.id] || {}, photos = e.photos || [];
  const badge = p.badge ? `<div class="m-badge${p.badgeRose?" rose":""}">${p.badge}</div>` : "";
  const hero = photos[0] ? `<img id="m-hero-img" src="${photos[0]}" alt="${p.name}">` : `<span class="emoji" aria-hidden="true">${CAT_META[p.cat].emoji}</span>`;
  const thumbs = photos.length>1
    ? `<div class="modal-thumbs">${photos.map((u,i)=>`<button data-src="${u}" class="${i===0?"active":""}" aria-label="Photo ${i+1}"><img src="${u}" alt=""></button>`).join("")}</div>` : "";
  const priceBit = p.price ? `<span class="m-price">${priceMarkup(p.price)}</span>` : "";
  const entryBit = p.entry
    ? `<span class="m-entry ${p.entry.startsWith("free")?"free":"paid"}">${p.entry.startsWith("free")?"✦ "+p.entry:"£ "+p.entry.replace(/^paid\s*·?\s*~?£?/,"")}</span>` : "";
  const ratingBit = e.rating ? `<span class="m-rating"><span class="s">★</span> ${e.rating.toFixed(1)} <span class="c">${e.count?("("+e.count.toLocaleString()+")"):""}</span></span>` : "";
  const cuisine = p.cuisine ? `<p class="cuisine">${p.cuisine}</p>` : "";
  const summary = p.summary ? `<p class="summary">${p.summary}</p>` : "";
  const must = p.mustTry ? `<p class="must"><b>Must-try:</b> ${p.mustTry}</p>` : "";
  const tip  = p.tip ? `<p class="tip"><b>Tip ·</b> ${p.tip}</p>` : "";
  const walk = p.walkIn ? `<p class="walk"><b>Walk-in ·</b> ${p.walkIn}</p>` : "";
  const tags = (p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("");
  const actions = [];
  if(p.bookingUrl) actions.push(`<a class="chip-link solid" href="${p.bookingUrl}" target="_blank" rel="noopener">${p.bookingLabel||"Book"} ↗</a>`);
  actions.push(`<a class="chip-link" href="${mapsUrl(p)}" target="_blank" rel="noopener">📍 Open in Maps</a>`);
  return `
    <div class="modal-hero" data-base="${p.cat}">${hero}${badge}<button class="modal-close" id="modalClose" aria-label="Close">✕</button></div>
    ${thumbs}
    <div class="modal-body">
      <span class="label">${p.hood}</span>
      <h2 id="m-title">${p.name}</h2>
      <div class="m-meta-row">${priceBit}${entryBit}${ratingBit}</div>
      ${cuisine}${summary}${must}${tip}${walk}
      <div class="modal-tags">${tags}</div>
      <div class="modal-actions">${actions.join("")}</div>
    </div>`;
}

function openDetail(id){
  const p = byId(id); if(!p) return;
  lastFocus = document.activeElement;
  modalCard.innerHTML = detailHTML(p);
  modalCard.scrollTop = 0;
  modal.classList.add("open"); modal.setAttribute("aria-hidden","false");
  document.body.classList.add("locked");
  document.getElementById("modalClose").addEventListener("click", closeDetail);
  modalCard.querySelectorAll(".modal-thumbs button").forEach(b=>{
    b.addEventListener("click",()=>{
      const img = document.getElementById("m-hero-img");
      if(img){ img.src = b.dataset.src; img.style.animation="none"; void img.offsetWidth; img.style.animation=""; }
      modalCard.querySelectorAll(".modal-thumbs button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
    });
  });
  document.getElementById("modalClose").focus();
}
function closeDetail(){
  modal.classList.remove("open"); modal.setAttribute("aria-hidden","true");
  document.body.classList.remove("locked");
  if(lastFocus) lastFocus.focus();
}
modal.addEventListener("click", e=>{ if(e.target===modal) closeDetail(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && modal.classList.contains("open")) closeDetail(); });

/* ---------- view switching ---------- */
const nav = document.getElementById("nav");
const navBtns = [...nav.querySelectorAll("button")];
navBtns.forEach(b=>{ const d=b.dataset.view; if(COUNTRY[d]) b.insertAdjacentHTML("afterbegin", flagHTML(COUNTRY[d])); });
let currentView = "hero";
function showView(name){
  const target = document.querySelector(`.view[data-view="${name}"]`);
  if(!target) return;
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active", v===target));
  navBtns.forEach(b=>b.classList.toggle("active", b.dataset.view===name));
  nav.classList.toggle("show", name!=="hero");
  window.scrollTo({ top:0, behavior:"auto" });
  currentView = name;
  if(name==="map") ensureMap();
}
navBtns.forEach(b=> b.addEventListener("click", ()=>showView(b.dataset.view)) );
document.getElementById("openTrip").addEventListener("click", ()=>showView("map"));

/* ---------- petals ---------- */
(function(){
  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const box = document.getElementById("petals");
  for(let i=0;i<16;i++){
    const p = document.createElement("span"); p.className="petal";
    const size = 8 + Math.random()*14;
    p.style.left = Math.random()*100 + "%";
    p.style.width = size+"px"; p.style.height = size+"px";
    p.style.opacity = (0.3 + Math.random()*0.4).toFixed(2);
    p.style.animationDuration = (9 + Math.random()*11)+"s";
    p.style.animationDelay = (-Math.random()*12)+"s";
    box.appendChild(p);
  }
})();

/* ---------- map ---------- */
const HOODS = {
  london:["Mayfair","Notting Hill","Chelsea","South Kensington","Bankside","London Bridge","Covent Garden","Marylebone","Farringdon"],
  hampstead:["Hampstead Village","Hampstead Heath","Highgate","Kenwood"],
  bath:["City Centre","Royal Crescent","Pulteney","Widcombe"],
  wales:["Cardiff","Cardiff Bay","Snowdonia / Eryri","Conwy","Llandudno","Portmeirion"],
  scotland:["Edinburgh Old Town","Edinburgh New Town","Glasgow West End","Isle of Skye","The Highlands"]
};
const mapFrame = document.getElementById("mapFrame");
const mapFallback = document.getElementById("mapFallback");
const hoodsEl = document.getElementById("hoods");
const mapNote = document.getElementById("mapNote");
let gmap=null, mapBuilt=false, mapBuilding=false, markerIds=new Set(), pinCache=null, currentDest="london";
const CITY_VIEW = {
  london:    { center:{lat:51.5074,lng:-0.1278}, zoom:11.5, embed:"London%2C+UK&z=11" },
  hampstead: { center:{lat:51.5605,lng:-0.1779}, zoom:14,   embed:"Hampstead%2C+London&z=14" },
  bath:      { center:{lat:51.3811,lng:-2.3590}, zoom:14,   embed:"Bath%2C+UK&z=14" },
  wales:     { center:{lat:52.40,lng:-3.80},     zoom:7.2,  embed:"Wales%2C+UK&z=7" },
  scotland:  { center:{lat:56.60,lng:-4.40},     zoom:6.4,  embed:"Scotland%2C+UK&z=6" },
};
function setCity(dest){
  currentDest = dest;
  hoodsEl.innerHTML = (HOODS[dest]||[]).map(h=>{
    const c = HOOD_COORDS[h];
    return c ? `<button class="hood-chip" data-lat="${c.lat}" data-lng="${c.lng}" data-zoom="${c.zoom}" title="Zoom to ${h}">${h}</button>` : `<span class="hood-chip">${h}</span>`;
  }).join("");
  if(gmap){ gmap.panTo(CITY_VIEW[dest].center); gmap.setZoom(CITY_VIEW[dest].zoom); }
  else { mapFallback.src = `https://www.google.com/maps?q=${CITY_VIEW[dest].embed}&output=embed`; }
}
hoodsEl.addEventListener("click", e=>{
  const b = e.target.closest("button.hood-chip"); if(!b) return;
  const lat=+b.dataset.lat, lng=+b.dataset.lng, z=+b.dataset.zoom;
  if(gmap){ gmap.panTo({lat,lng}); gmap.setZoom(z); }
  else { mapFallback.src = `https://www.google.com/maps?q=${lat},${lng}&z=${z}&output=embed`; }
});
document.getElementById("mapToggle").querySelectorAll("button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.getElementById("mapToggle").querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); setCity(b.dataset.city);
  });
});
setCity("london");

const BLUSH_STYLE=[
  {elementType:"geometry",stylers:[{color:"#FBEDEC"}]},
  {elementType:"labels.text.fill",stylers:[{color:"#9E8A88"}]},
  {elementType:"labels.text.stroke",stylers:[{color:"#FFFFFF"},{weight:2}]},
  {featureType:"administrative",elementType:"geometry",stylers:[{visibility:"off"}]},
  {featureType:"poi",elementType:"labels",stylers:[{visibility:"off"}]},
  {featureType:"poi.park",elementType:"geometry",stylers:[{color:"#EDE5D0"}]},
  {featureType:"landscape.man_made",elementType:"geometry",stylers:[{color:"#F7EAE8"}]},
  {featureType:"road",elementType:"geometry",stylers:[{color:"#F0D8D5"}]},
  {featureType:"road",elementType:"geometry.stroke",stylers:[{color:"#FFFFFF"}]},
  {featureType:"road",elementType:"labels",stylers:[{visibility:"simplified"}]},
  {featureType:"road.highway",elementType:"geometry",stylers:[{color:"#EAC9C5"}]},
  {featureType:"transit",stylers:[{visibility:"off"}]},
  {featureType:"water",elementType:"geometry",stylers:[{color:"#F5E6E4"}]},
];

let googleReady=false;
function loadGoogle(key){
  return new Promise((resolve,reject)=>{
    if(window.google?.maps?.importLibrary) return resolve();
    window.__gmReady = resolve;
    const s=document.createElement("script");
    s.src=`https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&v=weekly&libraries=places,maps&loading=async&callback=__gmReady`;
    s.async=true; s.onerror=reject; document.head.appendChild(s);
  });
}

/* localStorage cache so 100+ lookups only cost on first visit */
const CACHE_KEY="le_enrich_v3", CACHE_TTL=30*864e5;
function loadCache(){
  try{
    const c=JSON.parse(localStorage.getItem(CACHE_KEY)||"{}");
    if(c.__t && (Date.now()-c.__t)<CACHE_TTL){ delete c.__t; Object.assign(ENRICH,c); return true; }
  }catch(_){}
  return false;
}
function saveCache(){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify(Object.assign({__t:Date.now()},ENRICH))); }catch(_){} }

async function enrichOne(Place, p){
  try{
    const { places } = await Place.searchByText({
      textQuery:`${p.name}, ${p.hood}`,
      fields:["location","rating","userRatingCount","photos"],
      maxResultCount:1,
    });
    if(!places || !places.length) return;
    const pl=places[0], data=ENRICH[p.id]={};
    if(pl.location){ data.lat=pl.location.lat(); data.lng=pl.location.lng(); }
    if(pl.rating) data.rating=pl.rating;
    if(pl.userRatingCount) data.count=pl.userRatingCount;
    if(pl.photos && pl.photos.length) data.photos=pl.photos.slice(0,5).map(ph=>ph.getURI({maxWidth:1000}));
    applyCardEnrichment(p);
    if(mapBuilt) addMarker(p);
  }catch(_){}
}

function pinIcon(){
  if(!pinCache){
    const svg='<svg xmlns="http://www.w3.org/2000/svg" width="40" height="52" viewBox="0 0 40 52">'+
      '<path d="M20 2C10 2 2 10 2 19.5 2 33 20 50 20 50s18-17 18-30.5C38 10 30 2 20 2z" fill="#E8C5C1" stroke="#ffffff" stroke-width="2.5"/>'+
      '<circle cx="20" cy="19" r="12.5" fill="#FFF7F6"/></svg>';
    pinCache="data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(svg);
  }
  return { url:pinCache, scaledSize:new google.maps.Size(40,52), anchor:new google.maps.Point(20,52), labelOrigin:new google.maps.Point(20,19) };
}
function addMarker(p){
  if(markerIds.has(p.id)) return;
  const e=ENRICH[p.id]; if(!e || e.lat==null) return;
  const m=new google.maps.Marker({ position:{lat:e.lat,lng:e.lng}, map:gmap, icon:pinIcon(), title:p.name, label:{ text:CAT_META[p.cat].emoji, fontSize:"15px" } });
  m.addListener("click", ()=>openDetail(p.id));
  markerIds.add(p.id);
}
async function buildMap(){
  const { Map } = await google.maps.importLibrary("maps");
  gmap=new Map(document.getElementById("map-canvas"), {
    center:CITY_VIEW[currentDest].center, zoom:CITY_VIEW[currentDest].zoom,
    styles:BLUSH_STYLE, disableDefaultUI:true, zoomControl:true, gestureHandling:"cooperative", clickableIcons:false,
  });
  mapBuilt=true; mapFrame.classList.add("live");
  PLACES.forEach(addMarker);
}
async function ensureMap(){
  if(!googleReady || !CONFIG.googleApiKey) return;
  if(mapBuilt){ google.maps.event.trigger(gmap,"resize"); setCity(currentDest); return; }
  if(mapBuilding) return;
  mapBuilding=true; await buildMap(); mapBuilding=false;
}

(async function activateGoogle(){
  const key=CONFIG.googleApiKey;
  if(!key){ mapNote.textContent="Add a Google API key in the code to load live photos, ratings and pins."; return; }
  const hadCache = loadCache();
  if(hadCache) PLACES.forEach(p=>{ if(ENRICH[p.id]) applyCardEnrichment(p); });
  try{
    await loadGoogle(key);
    googleReady=true;
    if(currentView==="map") ensureMap();
    const { Place } = await google.maps.importLibrary("places");
    const todo = PLACES.filter(p=>!ENRICH[p.id]);
    const batch=8;
    for(let i=0;i<todo.length;i+=batch){
      await Promise.allSettled(todo.slice(i,i+batch).map(p=>enrichOne(Place,p)));
    }
    saveCache();
    mapNote.textContent="Tap any pin to open the place. Photos & ratings are live from Google.";
  }catch(err){
    mapNote.textContent="Couldn't reach Google (check the API key / enabled APIs). The trip still works.";
  }
})();
</script>
